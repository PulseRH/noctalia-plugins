id = "pulser/sysmon-temp"
name = "CPU Temp (mini)"
version = "0.1.0"
plugin_api = 5
min_noctalia = "5.0.0"
author = "pulser"
license = "MIT"
dependencies = []
tags = ["system"]
icon = "cpu-temperature"
description = "CPU package temperature always shown; hover can also show GPU, hottest NVMe, RAM (DIMM), and hottest CPU core, each toggleable below."

[[widget]]
id = "temp"
entry = "temp.luau"

  [[widget.setting]]
  key = "show_gpu"
  type = "bool"
  label_key = "settings.show_gpu.label"
  default = true

  [[widget.setting]]
  key = "show_nvme"
  type = "bool"
  label_key = "settings.show_nvme.label"
  default = false

  [[widget.setting]]
  key = "show_ram"
  type = "bool"
  label_key = "settings.show_ram.label"
  default = false

  [[widget.setting]]
  key = "show_hottest_core"
  type = "bool"
  label_key = "settings.show_hottest_core.label"
  default = false
