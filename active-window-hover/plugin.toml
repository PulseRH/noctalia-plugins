id = "pulser/active-window-hover"
name = "Active Window (hover expand)"
version = "0.4.0"
plugin_api = 5
min_noctalia = "5.0.0"
author = "pulser"
license = "MIT"
dependencies = []
tags = ["window"]
icon = "app-window-filled"
description = "Shows the focused window's title via wlrctl (wlr-foreign-toplevel-management), with the real per-app icon (via its .desktop entry + icon theme, rasterized/cached with ImageMagick) when one can be found. Compact/expand text width and icon size are both configurable separately, animating between them on hover. Scrolls as a marquee if still too long even expanded. Requires the `wlrctl` CLI tool."

[[widget]]
id = "active-window"
entry = "active_window.luau"

[[widget.setting]]
key = "compact_width"
type = "number"
label_key = "settings.compact_width.label"
description_key = "settings.compact_width.description"
default = 20
min = 8
max = 60
step = 1

[[widget.setting]]
key = "expand_width"
type = "number"
label_key = "settings.expand_width.label"
description_key = "settings.expand_width.description"
default = 40
min = 8
max = 100
step = 1

[[widget.setting]]
key = "icon_size"
type = "number"
label_key = "settings.icon_size.label"
description_key = "settings.icon_size.description"
default = 20
min = 12
max = 40
step = 1

[[widget.setting]]
key = "icon_size_hover"
type = "number"
label_key = "settings.icon_size_hover.label"
description_key = "settings.icon_size_hover.description"
default = 28
min = 12
max = 48
step = 1
