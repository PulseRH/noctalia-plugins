id = "pulser/sysmon-net-up"
name = "Upload speed (mini)"
version = "0.1.0"
plugin_api = 5
min_noctalia = "5.0.0"
author = "pulser"
license = "MIT"
dependencies = []
tags = ["system"]
icon = "upload-speed"
description = "Auto-detects the busiest interface. Hides entirely below an idle threshold (KB/s -- 1024 = 1 meg); hovering always shows it. Compact units (K/M) can be toggled off for full KB/s-MB/s."

[[widget]]
id = "net-up"
entry = "net_up.luau"

  [[widget.setting]]
  key = "threshold_kbps"
  type = "number"
  label_key = "settings.threshold_kbps.label"
  description_key = "settings.threshold_kbps.description"
  default = 1024
  min = 0
  max = 20480
  step = 32

  [[widget.setting]]
  key = "compact_units"
  type = "bool"
  label_key = "settings.compact_units.label"
  description_key = "settings.compact_units.description"
  default = true

  [[widget.setting]]
  key = "hide_completely"
  type = "bool"
  label_key = "settings.hide_completely.label"
  description_key = "settings.hide_completely.description"
  default = true
