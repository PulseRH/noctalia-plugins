id = "pulser/media-mini"
name = "Media (mini)"
version = "0.4.0"
min_noctalia = "5.0.0"
author = "pulser"
license = "MIT"
dependencies = []
tags = ["media"]
icon = "player-play-filled"
description = "Compact now-playing (artist - title) via playerctl/MPRIS, with rounded cover art and an inline playback-progress bar (both toggleable below). Expands from 20 to 40 characters on hover only if the text is actually longer than that; scrolls as a marquee on hover if it's still too long even expanded. Left-click opens the media panel, right-click toggles play/pause."

[[widget]]
id = "media"
entry = "media.luau"

[[widget.setting]]
key = "show_cover_art"
type = "bool"
label = "Show cover art"
description = "Replace the play/pause icon with the track's (rounded) cover art when available."
default = true

[[widget.setting]]
key = "show_progress_bar"
type = "bool"
label = "Show progress bar"
description = "Prefix an inline block-character bar showing playback position."
default = true

[[widget.setting]]
key = "cover_size"
type = "number"
label = "Cover art size (px)"
description = "Size of the cover art icon in place of the play/pause glyph."
default = 20
min = 12
max = 40
step = 1

[[widget.setting]]
key = "corner_rounding"
type = "number"
label = "Cover art rounding (%)"
description = "0 = square corners, 100 = fully circular."
default = 100
min = 0
max = 100
step = 5
