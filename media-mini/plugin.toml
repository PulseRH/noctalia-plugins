id = "pulser/media-mini"
name = "Media (mini)"
version = "0.9.0"
plugin_api = 5
min_noctalia = "5.0.0"
author = "pulser"
license = "MIT"
dependencies = []
tags = ["media"]
icon = "player-play-filled"
description = "Compact now-playing (artist - title) via playerctl/MPRIS, preferring whichever player is actually Playing over a paused/stale one, with rounded cover art (including a YouTube-thumbnail fallback for browser MPRIS, which doesn't expose real art) and an image-rendered playback-progress bar beside it (both toggleable below). Compact/expand text width, cover size, and rounding are all configurable settings. Scrolls as a marquee on hover if still too long even expanded; keeps polling while scrolling so a track change is never missed. Left-click toggles play/pause, right-click opens the media panel, and scrolling over the widget skips tracks (scroll up = previous, scroll down = next)."

[[widget]]
id = "media"
entry = "media.luau"

[[widget.setting]]
key = "show_cover_art"
type = "bool"
label_key = "settings.show_cover_art.label"
description_key = "settings.show_cover_art.description"
default = true

[[widget.setting]]
key = "show_progress_bar"
type = "bool"
label_key = "settings.show_progress_bar.label"
description_key = "settings.show_progress_bar.description"
default = true

[[widget.setting]]
key = "compact_width"
type = "number"
label_key = "settings.compact_width.label"
description_key = "settings.compact_width.description"
default = 20
min = 8
max = 60
step = 1

[[widget.setting]]
key = "expand_width"
type = "number"
label_key = "settings.expand_width.label"
description_key = "settings.expand_width.description"
default = 40
min = 8
max = 100
step = 1

[[widget.setting]]
key = "cover_size"
type = "number"
label_key = "settings.cover_size.label"
description_key = "settings.cover_size.description"
default = 20
min = 12
max = 40
step = 1

[[widget.setting]]
key = "corner_rounding"
type = "number"
label_key = "settings.corner_rounding.label"
description_key = "settings.corner_rounding.description"
default = 100
min = 0
max = 100
step = 5
