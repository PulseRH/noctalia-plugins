id = "pulser/sysmon-ram"
name = "RAM (mini)"
version = "0.1.0"
plugin_api = 5
min_noctalia = "5.0.0"
author = "pulser"
license = "MIT"
dependencies = []
tags = ["system"]
icon = "memory"
description = "Compact gauge bar or plain percentage (toggle below); hover shows percent and used/total GB (total auto-detected)."

[[widget]]
id = "ram"
entry = "ram.luau"

  [[widget.setting]]
  key = "gauge"
  type = "bool"
  label_key = "settings.gauge.label"
  description_key = "settings.gauge.description"
  default = true
