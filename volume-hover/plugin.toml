id = "pulser/volume-hover"
name = "Volume (scroll slider)"
version = "0.5.0"
plugin_api = 5
min_noctalia = "5.0.0"
author = "pulser"
license = "MIT"
dependencies = []
tags = ["audio"]
icon = "volume-high"
description = "Volume as a persistent speaker glyph (Tabler icon, struck-through when muted) with a solid rounded slider that reveals to its right on hover, animating open/close with the same eased timing as the other hover widgets. Scroll over the widget to change volume, left-click opens the audio panel (real draggable slider), right-click toggles mute. Speaker and bar are baked together into one image (in the theme colour) so reveal frames are pre-baked and swapped per animation step. Needs ImageMagick; without it, falls back to a plain glyph + percentage."

[[widget]]
id = "volume"
entry = "volume.luau"

[[widget.setting]]
key = "bar_color"
type = "select"
label_key = "settings.bar_color.label"
description_key = "settings.bar_color.description"
default = "primary"
options = [
  { value = "primary", label_key = "settings.bar_color.options.primary" },
  { value = "onsurface", label_key = "settings.bar_color.options.onsurface" },
  { value = "secondary", label_key = "settings.bar_color.options.secondary" },
  { value = "tertiary", label_key = "settings.bar_color.options.tertiary" },
  { value = "hover", label_key = "settings.bar_color.options.hover" },
  { value = "error", label_key = "settings.bar_color.options.error" },
]

[[widget.setting]]
key = "slider_width"
type = "number"
label_key = "settings.slider_width.label"
description_key = "settings.slider_width.description"
default = 90
min = 40
max = 240
step = 2

[[widget.setting]]
key = "scroll_step"
type = "number"
label_key = "settings.scroll_step.label"
description_key = "settings.scroll_step.description"
default = 5
min = 1
max = 25
step = 1

[[widget.setting]]
key = "invert_scroll"
type = "bool"
label_key = "settings.invert_scroll.label"
description_key = "settings.invert_scroll.description"
default = false

[[widget.setting]]
key = "show_percent"
type = "bool"
label_key = "settings.show_percent.label"
description_key = "settings.show_percent.description"
default = true
